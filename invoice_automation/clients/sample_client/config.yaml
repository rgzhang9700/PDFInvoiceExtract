client:
  name: "Sample Accounting Firm"
  client_id: "sample_client"

email:
  enabled: false

  accounts:
    - name: "main_ap_inbox"
      enabled: true
      imap_server: "imap.gmail.com"
      email_user: "ap@example.com"
      email_password: "gmail_app_password"
      mailbox: "INBOX"
      search_query: '(UNSEEN)'
      mark_seen: true
      unknown_folder: "./downloads/UNKNOWN"

      rules:
        - vendor: "FLEETPRIDE"
          match: "any"
          from_contains: "fleetpride"
          subject_contains: "fleetpride"
          filename_contains: "fleetpride"
          download_folder: "./downloads/FLEETPRIDE"

        - vendor: "LESHWEB"
          match: "any"
          from_contains: "leshweb"
          subject_contains: "leshweb"
          filename_contains: "leshweb"
          download_folder: "./downloads/LESHWEB"

        - vendor: "OILVANDOR"
          match: "any"
          from_contains: "valvoline"
          subject_contains: "valvoline"
          filename_contains: "valvoline"
          download_folder: "./downloads/OILVANDOR"

processing:
  move_processed: true
  processed_folder: "./processed"
  move_failed: true
  failed_folder: "./error"
  append_timestamp_if_exists: true

logging:
  log_folder: "./logs"
  success_log: "success_log.csv"
  error_log: "error_log.csv"
  run_summary_log: "run_summary.csv"

history:
  database_file: "./logs/invoice_history.sqlite"

excel:
  sheet_name: "Data"
  max_records_per_file: 50
  document_currency: "USD"
  accounting_document_type: "NS"
  supplier_invoice_transaction_type: "1"

vendors:
  FLEETPRIDE:
    parser: "fleetpride"
    input_folder: "./downloads/FLEETPRIDE"
    template_file: "./templates/Invoice_Template_no_PO.XLSX"
    output_folder: "./output/FLEETPRIDE"
    file_prefix: "FLEETPRIDE_invoice_load"
    company_code: "4600"
    vendor_code: "V00096"
    cost_center: "460020450"
    gl_account: "51000100"
    tax_code: "I0"
    tax_jurisdiction: "0506736560"
    item_text: "FLEETPRIDE Invoice"

  LESHWEB:
    parser: "generic"
    input_folder: "./downloads/LESHWEB"
    template_file: "./templates/Invoice_Template_no_PO.XLSX"
    output_folder: "./output/LESHWEB"
    file_prefix: "LESHWEB_invoice_load"
    company_code: "4600"
    vendor_code: ""
    cost_center: ""
    gl_account: ""
    tax_code: "I0"
    tax_jurisdiction: ""
    item_text: "LESHWEB Invoice"

  OILVANDOR:
    parser: "valvoline"
    input_folder: "./downloads/OILVANDOR"
    template_file: "./templates/Invoice_Template_no_PO.XLSX"
    output_folder: "./output/OILVANDOR"
    file_prefix: "OILVANDOR_invoice_load"
    company_code: "4600"
    vendor_code: "V02305"
    cost_center: "460020450"
    gl_account: "51000230"
    tax_code: "I0"
    tax_jurisdiction: "0506736560"
    item_text: "Oil Change"