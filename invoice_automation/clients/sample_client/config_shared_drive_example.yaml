client:
  name: "Shared Drive Client"
  client_id: "shared_drive_client"

email:
  enabled: true
  accounts:
    - name: "client_ap_inbox"
      enabled: true
      imap_server: "imap.gmail.com"
      email_user: "ap@example.com"
      email_password: "gmail_app_password"
      mailbox: "INBOX"
      search_query: '(UNSEEN)'
      mark_seen: true
      unknown_folder: "G:/Shared drives/AP Invoices/UNKNOWN"
      rules:
        - vendor: "FLEETPRIDE"
          match: "any"
          from_contains: "fleetpride"
          subject_contains: "fleetpride"
          filename_contains: "fleetpride"
          download_folder: "G:/Shared drives/AP Invoices/FLEETPRIDE"

        - vendor: "LESHWEB"
          match: "any"
          from_contains: "leshweb"
          subject_contains: "leshweb"
          filename_contains: "leshweb"
          download_folder: "G:/Shared drives/AP Invoices/LESHWEB"

        - vendor: "OILVANDOR"
          match: "any"
          from_contains: "valvoline"
          subject_contains: "valvoline"
          filename_contains: "valvoline"
          download_folder: "G:/Shared drives/AP Invoices/OILVANDOR"

processing:
  move_processed: true
  processed_folder: "G:/Shared drives/AP Processed"
  move_failed: true
  failed_folder: "G:/Shared drives/AP Error"
  append_timestamp_if_exists: true

logging:
  log_folder: "G:/Shared drives/AP Logs"
  success_log: "success_log.csv"
  error_log: "error_log.csv"
  run_summary_log: "run_summary.csv"

history:
  database_file: "G:/Shared drives/AP Logs/invoice_history.sqlite"

excel:
  sheet_name: "Data"
  max_records_per_file: 50
  document_currency: "USD"
  accounting_document_type: "NS"
  supplier_invoice_transaction_type: "1"

vendors:
  FLEETPRIDE:
    parser: "generic"
    input_folder: "G:/Shared drives/AP Invoices/FLEETPRIDE"
    template_file: "G:/Shared drives/AP Templates/FLEETPRIDE/fleetpride_template.xlsx"
    output_folder: "G:/Shared drives/AP Output/FLEETPRIDE"
    file_prefix: "FLEETPRIDE_invoice_load"
    company_code: "4600"
    vendor_code: ""
    cost_center: ""
    gl_account: ""
    tax_code: "I0"
    tax_jurisdiction: ""
    item_text: "FLEETPRIDE Invoice"

  LESHWEB:
    parser: "generic"
    input_folder: "G:/Shared drives/AP Invoices/LESHWEB"
    template_file: "G:/Shared drives/AP Templates/LESHWEB/leshweb_template.xlsx"
    output_folder: "G:/Shared drives/AP Output/LESHWEB"
    file_prefix: "LESHWEB_invoice_load"
    company_code: "4600"
    vendor_code: ""
    cost_center: ""
    gl_account: ""
    tax_code: "I0"
    tax_jurisdiction: ""
    item_text: "LESHWEB Invoice"

  OILVANDOR:
    parser: "valvoline"
    input_folder: "G:/Shared drives/AP Invoices/OILVANDOR"
    template_file: "G:/Shared drives/AP Templates/OILVANDOR/oilvandor_template.xlsx"
    output_folder: "G:/Shared drives/AP Output/OILVANDOR"
    file_prefix: "OILVANDOR_invoice_load"
    company_code: "4600"
    vendor_code: "V02305"
    cost_center: "460020450"
    gl_account: "51000230"
    tax_code: "I0"
    tax_jurisdiction: "0506736560"
    item_text: "Oil Change"